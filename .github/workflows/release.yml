name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

# Pipeline unica: bump -> build (Windows + macOS) -> release nello stesso run.
# Un push fatto col GITHUB_TOKEN (il commit di bump) NON innesca altri workflow,
# quindi facciamo tutto in un solo run.
jobs:
  bump:
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      short_sha: ${{ steps.bump.outputs.short_sha }}
      full_sha: ${{ steps.bump.outputs.full_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: bump
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          NEW=$(node -e "const [a,b,c]='$CURRENT'.split('.').map(Number);console.log(a+'.'+b+'.'+(c+1));")
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version='$NEW';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"
          git add package.json
          git commit -m "chore: bump version to $NEW"
          git push
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "full_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    needs: bump
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.full_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app (electron-vite)
        run: npm run build
        env:
          UPDATE_DOWNLOAD_URL: ${{ vars.UPDATE_DOWNLOAD_URL }}
          # Config "baked" nella build (la versione compilata non ha .env.local)
          ACCEPTED_DOMAINS: ${{ secrets.ACCEPTED_DOMAINS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          # FTP/SFTP staging/prod precaricati nella build (sovrascrivibili in-app).
          # I campi non sensibili si leggono da Variables OPPURE Secrets (fallback),
          # così funziona comunque siano stati salvati; i segreti solo da Secrets.
          FTP_STAGING_PROTOCOL: ${{ vars.FTP_STAGING_PROTOCOL || secrets.FTP_STAGING_PROTOCOL }}
          FTP_STAGING_HOST: ${{ vars.FTP_STAGING_HOST || secrets.FTP_STAGING_HOST }}
          FTP_STAGING_PORT: ${{ vars.FTP_STAGING_PORT || secrets.FTP_STAGING_PORT }}
          FTP_STAGING_USER: ${{ vars.FTP_STAGING_USER || secrets.FTP_STAGING_USER }}
          FTP_STAGING_SECURE: ${{ vars.FTP_STAGING_SECURE || secrets.FTP_STAGING_SECURE }}
          FTP_STAGING_DIR: ${{ vars.FTP_STAGING_DIR || secrets.FTP_STAGING_DIR }}
          FTP_STAGING_PASS: ${{ secrets.FTP_STAGING_PASS }}
          FTP_STAGING_KEY: ${{ secrets.FTP_STAGING_KEY }}
          FTP_STAGING_PASSPHRASE: ${{ secrets.FTP_STAGING_PASSPHRASE }}
          FTP_PROD_PROTOCOL: ${{ vars.FTP_PROD_PROTOCOL || secrets.FTP_PROD_PROTOCOL }}
          FTP_PROD_HOST: ${{ vars.FTP_PROD_HOST || secrets.FTP_PROD_HOST }}
          FTP_PROD_PORT: ${{ vars.FTP_PROD_PORT || secrets.FTP_PROD_PORT }}
          FTP_PROD_USER: ${{ vars.FTP_PROD_USER || secrets.FTP_PROD_USER }}
          FTP_PROD_SECURE: ${{ vars.FTP_PROD_SECURE || secrets.FTP_PROD_SECURE }}
          FTP_PROD_DIR: ${{ vars.FTP_PROD_DIR || secrets.FTP_PROD_DIR }}
          FTP_PROD_PASS: ${{ secrets.FTP_PROD_PASS }}
          FTP_PROD_KEY: ${{ secrets.FTP_PROD_KEY }}
          FTP_PROD_PASSPHRASE: ${{ secrets.FTP_PROD_PASSPHRASE }}
          # Mailbox condivisa opzionale per i riepiloghi (override)
          EXPORT_NOTIFY_SHARED: ${{ vars.EXPORT_NOTIFY_SHARED || secrets.EXPORT_NOTIFY_SHARED }}
          EXPORT_NOTIFY_MODE: ${{ vars.EXPORT_NOTIFY_MODE || secrets.EXPORT_NOTIFY_MODE }}

      - name: Build installer (${{ matrix.platform }})
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Build macOS non firmata: senza certificato Apple electron-builder
          # tenterebbe comunque la firma e fallirebbe. Disattiviamo la firma.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # Gli asset vengono allegati direttamente alla GitHub Release invece di
      # passare per gli artifact di Actions (che consumano la quota di storage,
      # ormai esaurita). La release e' l'unica fonte usata dal release-distributor.
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump.outputs.version }}-${{ needs.bump.outputs.short_sha }}
          name: CSA Adesioni v${{ needs.bump.outputs.version }}
          target_commitish: ${{ needs.bump.outputs.full_sha }}
          body: |
            Build automatica (Windows + macOS) dal commit `${{ needs.bump.outputs.short_sha }}`.

            | Piattaforma | File |
            |-------------|------|
            | Windows     | `.exe` (installer NSIS x64) |
            | macOS       | `.dmg` (Apple Silicon arm64 + Intel x64) |
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.yml
            dist/*.blockmap
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
